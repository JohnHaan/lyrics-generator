<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>찬양 콘티 생성기</title>
<style>
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
    max-width: 720px;
    margin: 40px auto;
    padding: 0 16px;
    color: #222;
  }
  h1 { font-size: 1.4rem; }
  p.desc { color: #555; line-height: 1.5; }
  textarea {
    width: 100%;
    height: 220px;
    font-size: 1rem;
    padding: 10px;
    box-sizing: border-box;
    line-height: 1.6;
  }
  button {
    margin-top: 12px;
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
  }
  #status {
    margin-top: 16px;
    white-space: pre-wrap;
  }
  #status.error { color: #c00; }
  #status.success { color: #060; }
  #songList {
    margin-top: 24px;
    font-size: 0.9rem;
    color: #555;
  }
</style>
</head>
<body>
  <h1>찬양 콘티 생성기</h1>
  <p class="desc">
    부를 곡 제목을 한 줄에 하나씩, 순서대로 입력하세요. 제목은 소스 폴더에 등록된 제목과
    정확히 일치해야 합니다.
  </p>
  <textarea id="titles" placeholder="함께 지어져 가네
생명 주께 있네 + 멈출 수 없네
실로암"></textarea>
  <br />
  <button id="generate">콘티 만들기</button>
  <div id="status"></div>
  <div id="songList"></div>

  <script src="vendor/jszip.min.js"></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
